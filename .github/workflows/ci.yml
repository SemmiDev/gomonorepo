# .github/workflows/ci.yml
#
# CI/CD Pipeline untuk Go Monorepo
#
# Pipeline ini otomatis berjalan setiap kali ada push ke branch main
# atau ada Pull Request. Dia memastikan:
#   1. Semua proto files di-generate ulang dan konsisten
#   2. Code linting tidak ada violation
#   3. Semua unit test lulus
#   4. Docker images berhasil di-build
#   5. (Opsional) Deploy ke staging/production
#
# FILOSOFI: "If it's not in CI, it doesn't exist"
# Semua checks yang ada di sini HARUS juga bisa dijalankan secara lokal
# dengan 'make' commands. Jadi developer bisa verify sebelum push.

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Izin yang dibutuhkan oleh workflow
permissions:
  contents: read
  packages: write # Untuk push Docker image ke GHCR

jobs:
  # ── JOB 1: Proto Lint & Breaking Change Detection ──────────────────
  # Berjalan pertama karena yang lain bergantung pada generated code
  proto-check:
    name: Proto Lint & Breaking Change Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history untuk buf breaking change detection

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          version: "1.47.2"

      - name: Lint .proto files
        run: cd proto && buf lint

      - name: Check for breaking changes
        # Bandingkan dengan branch main. Ini mencegah developer secara tidak sengaja
        # membuat perubahan yang tidak backward-compatible di .proto files.
        run: cd proto && buf breaking --against '.git#branch=main'
        # Jika ini PR ke main dari branch develop, perbandingan terhadap main
        if: github.event_name == 'pull_request'

  # ── JOB 2: Test & Lint ──────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    needs: proto-check # Tunggu proto-check selesai dulu
    strategy:
      # Matrix strategy memungkinkan kita test di beberapa Go version sekaligus.
      # Sangat berguna untuk memastikan code kita kompatibel dengan versi yang didukung.
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          # Cache Go module downloads antar run untuk mempercepat CI
          cache: true
          cache-dependency-path: |
            shared/go.sum
            services/user-svc/go.sum
            services/order-svc/go.sum

      - name: Download dependencies
        # go work sync memastikan semua module dalam workspace sync
        run: go work sync

      - name: Run linter (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Jalankan linter di semua service
          working-directory: services/user-svc
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/order-svc

      - name: Run tests
        # -race: deteksi race conditions (WAJIB untuk concurrent code)
        # -coverprofile: simpan coverage data untuk upload ke Codecov
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false # Jangan gagalkan CI jika Codecov bermasalah

  # ── JOB 3: Build Docker Images ──────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test # Hanya build jika test lulus
    # Hanya push image ke registry jika kita push ke branch main (bukan PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx mendukung multi-platform builds (linux/amd64, linux/arm64)
        # dan build cache yang lebih efisien

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push user-svc
        uses: docker/build-push-action@v5
        with:
          context: . # Root monorepo sebagai build context
          file: services/user-svc/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/user-svc:latest
            ghcr.io/${{ github.repository }}/user-svc:${{ github.sha }}
          # Cache layer dari build sebelumnya untuk mempercepat
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build untuk multiple architectures sekaligus
          platforms: linux/amd64,linux/arm64

      - name: Build & Push order-svc
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/order-svc/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/order-svc:latest
            ghcr.io/${{ github.repository }}/order-svc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
